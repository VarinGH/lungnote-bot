<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>เวลาทานยา</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue",
        "Noto Sans Thai", "Sukhumvit Set", Tahoma, sans-serif;
      background: #f4f6f5; color: #1a1a1a;
      font-size: 20px; line-height: 1.5;
      min-height: 100vh;
    }
    .wrap { max-width: 480px; margin: 0 auto; }
    header {
      background: #06C755; color: #fff;
      padding: 20px 20px 22px; text-align: center;
    }
    header h1 { margin: 0; font-size: 26px; font-weight: 700; }
    header p { margin: 6px 0 0; font-size: 17px; opacity: .95; }
    main { padding: 16px; }
    .row {
      background: #fff; border-radius: 16px;
      display: flex; align-items: center; gap: 14px;
      padding: 16px 18px; margin-bottom: 14px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .row .ico { font-size: 34px; width: 44px; text-align: center; flex: 0 0 auto; }
    .row .lab { flex: 1 1 auto; font-size: 22px; font-weight: 600; }
    .row input[type=time] {
      font-size: 30px; font-weight: 700; font-family: inherit;
      border: 2px solid #d7ddda; border-radius: 12px;
      padding: 10px 12px; width: 150px; text-align: center;
      color: #06804a; background: #f7faf8;
      min-height: 60px;
    }
    .row input[type=time]:focus { outline: none; border-color: #06C755; }
    button#save {
      width: 100%; margin-top: 8px;
      background: #06C755; color: #fff; border: none;
      border-radius: 16px; padding: 20px;
      font-size: 24px; font-weight: 700; font-family: inherit;
      min-height: 68px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    button#save:active { background: #05a647; }
    button#save:disabled { background: #9fd9ba; }
    .hint { text-align: center; color: #7a8580; font-size: 16px; margin: 14px 8px 24px; }
    .msg { text-align: center; padding: 40px 20px; font-size: 21px; color: #444; }
    .done .ico-ok { font-size: 64px; }
    .hide { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1 id="h-title">เวลาทานยา</h1>
      <p id="h-sub">ตั้งเวลาให้ครบ แล้วกดบันทึกครับ</p>
    </header>

    <main id="loading" class="msg">กำลังโหลด...</main>

    <main id="form" class="hide">
      <div class="row">
        <div class="ico">🌅</div>
        <div class="lab" data-lab="morning">เช้า</div>
        <input type="time" id="morning" step="60">
      </div>
      <div class="row">
        <div class="ico">☀️</div>
        <div class="lab" data-lab="midday">กลางวัน</div>
        <input type="time" id="midday" step="60">
      </div>
      <div class="row">
        <div class="ico">🌆</div>
        <div class="lab" data-lab="evening">เย็น</div>
        <input type="time" id="evening" step="60">
      </div>
      <div class="row">
        <div class="ico">🌙</div>
        <div class="lab" data-lab="bedtime">ก่อนนอน</div>
        <input type="time" id="bedtime" step="60">
      </div>

      <button id="save"><span id="save-label">บันทึก</span></button>
      <p class="hint" id="hint">ปรับเวลาทั้ง 4 มื้อในหน้านี้ แล้วกดบันทึกครั้งเดียว</p>
    </main>

    <main id="done" class="hide msg done">
      <div class="ico-ok">✅</div>
      <p id="done-text">บันทึกเรียบร้อยแล้วครับ</p>
    </main>
  </div>

  <script>
  (function () {
    var LIFF_ID = "__LIFF_ID__";
    var qs = new URLSearchParams(location.search);
    var lang = qs.get('lang') === 'en' ? 'en' : 'th';
    var SLOTS = ['morning', 'midday', 'evening', 'bedtime'];

    var T = {
      th: { title: 'เวลาทานยา', sub: 'ตั้งเวลาให้ครบ แล้วกดบันทึกครับ',
            labels: { morning: 'เช้า', midday: 'กลางวัน', evening: 'เย็น', bedtime: 'ก่อนนอน' },
            save: 'บันทึก', saving: 'กำลังบันทึก...', done: 'บันทึกเรียบร้อยแล้วครับ',
            hint: 'ปรับเวลาทั้ง 4 มื้อในหน้านี้ แล้วกดบันทึกครั้งเดียว',
            err: 'ขอโทษครับ บันทึกไม่สำเร็จ ลองอีกครั้งนะครับ',
            outside: 'กรุณาเปิดหน้านี้จากแชตลุงโน้ตในแอป LINE นะครับ' },
      en: { title: 'Medication times', sub: 'Set all times, then tap save',
            labels: { morning: 'Morning', midday: 'Midday', evening: 'Evening', bedtime: 'Bedtime' },
            save: 'Save', saving: 'Saving...', done: 'Saved!',
            hint: 'Set all 4 times on this screen, then save once.',
            err: 'Sorry, saving failed. Please try again.',
            outside: 'Please open this page from the Uncle Note chat in the LINE app.' }
    };
    var t = T[lang];

    function show(id) {
      ['loading', 'form', 'done'].forEach(function (k) {
        document.getElementById(k).classList.toggle('hide', k !== id);
      });
    }
    function applyLang() {
      document.documentElement.lang = lang;
      document.getElementById('h-title').textContent = t.title;
      document.getElementById('h-sub').textContent = t.sub;
      document.getElementById('save-label').textContent = t.save;
      document.getElementById('hint').textContent = t.hint;
      document.getElementById('done-text').textContent = t.done;
      document.querySelectorAll('[data-lab]').forEach(function (el) {
        el.textContent = t.labels[el.getAttribute('data-lab')];
      });
    }

    var token = null;

    function api(path, opts) {
      opts = opts || {};
      opts.headers = Object.assign({ Authorization: 'Bearer ' + token }, opts.headers || {});
      return fetch(path, opts);
    }

    async function start() {
      applyLang();
      try {
        await liff.init({ liffId: LIFF_ID });
      } catch (e) {
        document.getElementById('loading').textContent = t.outside;
        return;
      }
      if (!liff.isLoggedIn()) { liff.login(); return; }
      token = liff.getAccessToken();
      if (!token) { document.getElementById('loading').textContent = t.outside; return; }

      try {
        var times = await api('/api/meal-times').then(function (r) { return r.json(); });
        SLOTS.forEach(function (s) { document.getElementById(s).value = times[s] || ''; });
      } catch (e) { /* fall back to empty inputs */ }
      show('form');
    }

    document.getElementById('save').addEventListener('click', async function () {
      var btn = this;
      var body = {};
      for (var i = 0; i < SLOTS.length; i++) {
        var v = document.getElementById(SLOTS[i]).value;
        if (!v) { document.getElementById('hint').textContent = t.hint; return; }
        body[SLOTS[i]] = v;
      }
      btn.disabled = true;
      document.getElementById('save-label').textContent = t.saving;
      try {
        var r = await api('/api/meal-times', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ times: body })
        });
        if (!r.ok) throw new Error('save failed');
        show('done');
        setTimeout(function () { if (liff.isInClient()) liff.closeWindow(); }, 1100);
      } catch (e) {
        btn.disabled = false;
        document.getElementById('save-label').textContent = t.save;
        document.getElementById('hint').textContent = t.err;
      }
    });

    start();
  })();
  </script>
</body>
</html>
